<form id="kycForm">

    <input
        type="text"
        name="company_name"
        placeholder="Company Name"
        required
    >

    <textarea
        name="bio"
        placeholder="Company Bio"
        required
    ></textarea>

    <select
        name="industry"
        required
    >
        <option value="">
            Select Industry
        </option>

        <option value="Technology">Technology</option>
        <option value="Finance">Finance</option>
        <option value="Healthcare">Healthcare</option>
        <option value="Education">Education</option>
        <option value="Agriculture">Agriculture</option>
        <option value="Retail">Retail</option>
        <option value="Manufacturing">Manufacturing</option>
        <option value="Real Estate">Real Estate</option>
        <option value="Energy">Energy</option>
        <option value="Transportation">Transportation</option>
    </select>

    <input
        type="number"
        name="min_investment"
        placeholder="Minimum Investment"
        required
    >

    <input
        type="number"
        name="max_investment"
        placeholder="Maximum Investment"
        required
    >

    <button type="submit">
        Submit KYC
    </button>

</form>

<p id="message"></p>

<script>

document
.getElementById("kycForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const form = e.target;

    const minInvestment =
        Number(form.min_investment.value);

    const maxInvestment =
        Number(form.max_investment.value);

    if (minInvestment > maxInvestment) {

        document
            .getElementById("message")
            .textContent =
            "Minimum investment cannot be greater than maximum investment.";

        return;
    }

    try {

        const response = await fetch(
            "/api/profile/kyc",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json"
                },

                body: JSON.stringify({
                    company_name:
                        form.company_name.value,

                    bio:
                        form.bio.value,

                    industry:
                        form.industry.value,

                    min_investment:
                        minInvestment,

                    max_investment:
                        maxInvestment
                })
            }
        );

        const data =
            await response.json();

        if (data.success) {

            document
                .getElementById("message")
                .textContent =
                "KYC submitted successfully. Waiting for admin approval.";

            form.reset();

        } else {

            document
                .getElementById("message")
                .textContent =
                data.error ||
                "Failed to submit KYC.";

        }

    } catch (error) {

        document
            .getElementById("message")
            .textContent =
            "Server error.";

        console.error(error);

    }

});

</script>
