<!DOCTYPE html>
<html>
<head>
  <title>Browse Ideas</title>
</head>
<body>

<nav>
  <a href="/investor/dashboard">Dashboard</a>
  <a href="/investor/browse">Browse Ideas</a>
</nav>

<h1>Available Ideas</h1>

<div id="ideas"></div>

<script>
async function loadIdeas() {
  const res = await fetch("/api/ideas");
  const ideas = await res.json();

  const container = document.getElementById("ideas");

  container.innerHTML = ideas.map(idea => `
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
      <h3>${idea.title}</h3>
      <p>${idea.description}</p>
      <p>Funding Needed: ${idea.funding_needed}</p>

      <button onclick="interested(${idea.id})">
        I'm OnBoard
      </button>
    </div>
  `).join("");
}

async function interested(ideaId) {
  const res = await fetch("/api/interests", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      idea_id: ideaId,
      message: "Interested in your idea",
      amount: 10000
    })
  });

  const data = await res.json();
  alert("Interest sent!");
}

loadIdeas();
</script>

</body>
</html>
