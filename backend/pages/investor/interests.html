<!DOCTYPE html>
<html>
<head>
  <title>My Interests</title>
</head>
<body>

<nav>
  <a href="/investor/dashboard">Dashboard</a>
  <a href="/investor/browse">Browse Ideas</a>
  <a href="/investor/interests">My Interests</a>
</nav>

<h1>My Interests</h1>

<div id="list"></div>

<script>
async function loadInterests() {
  const res = await fetch("/api/interests/mine");
  const data = await res.json();

  const container = document.getElementById("list");

  if (data.length === 0) {
    container.innerHTML = "<p>No interests yet</p>";
    return;
  }

  container.innerHTML = data.map(i => `
    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
      <h3>${i.title}</h3>
      <p>${i.message}</p>
      <p>Amount: ${i.amount}</p>
      <p>Status: ${i.status}</p>
    </div>
  `).join("");
}

loadInterests();
</script>

</body>
</html>
