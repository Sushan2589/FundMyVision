<h1>Pending Investor KYC</h1>

<div id="list"></div>

<script>
async function loadKYC() {
  const res = await fetch("/api/admin/kyc/pending");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(inv => {
    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>${inv.company_name}</h3>
        <p><b>Bio:</b> ${inv.bio}</p>
        <p><b>Industry:</b> ${inv.industry}</p>
        <p><b>Investment:</b> ${inv.min_investment} - ${inv.max_investment}</p>
        
        <button onclick="approve(${inv.user_id})">Approve</button>
        <button onclick="reject(${inv.user_id})">Reject</button>
      </div>
    `;
  });
}

async function approve(id) {
  await fetch("/api/admin/kyc/approve", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: id })
  });

  loadKYC();
}

async function reject(id) {
  await fetch("/api/admin/kyc/reject", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: id })
  });

  loadKYC();
}

loadKYC();
</script>
