<!DOCTYPE html>
<html>
<head>
  <title>Create Idea</title>
</head>
<body>

<nav>
  <a href="/ideator/dashboard">Dashboard</a>
  <a href="/ideator/ideas">My Ideas</a>
  <a href="/logout">Logout</a>
</nav>

<h1>Create Idea</h1>

<form action="/api/ideas/create" method="POST">

  <input type="text" name="title" placeholder="Title" required>
  <br><br>

  <textarea name="description" placeholder="Description" required></textarea>
  <br><br>

  <input type="number" name="funding_needed" placeholder="Funding Needed">
  <br><br>

  <button type="submit">Create</button>

</form>

</body>
</html>
