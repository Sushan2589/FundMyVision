<h1>Interested Investors</h1>

<div id="list"></div>

<script>
async function loadInterests() {
  const res = await fetch("/api/interests/received");
  const data = await res.json();

  const container = document.getElementById("list");

  container.innerHTML = data.map(i => `
    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
      
      <h3>${i.idea_title}</h3>
      <p><b>Investor:</b> ${i.investor_name}</p>
      <p><b>Message:</b> ${i.message}</p>
      <p><b>Amount:</b> ${i.amount}</p>
      <p><b>Status:</b> ${i.status}</p>

      ${
        i.status === "pending"
        ? `
          <button onclick="approve(${i.id})">Approve</button>
          <button onclick="reject(${i.id})">Reject</button>
        `
        : `<b>Final: ${i.status}</b>`
      }

    </div>
  `).join("");
}

async function approve(id) {
  await fetch("/api/interests/approve", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ interest_id: id })
  });

  loadInterests();
}

async function reject(id) {
  await fetch("/api/interests/reject", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ interest_id: id })
  });

  loadInterests();
}

loadInterests();
</script>
