<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>
</head>
<body>

<nav>
  <a href="/ideator/dashboard">Dashboard</a>
  <a href="/ideator/ideas">My Ideas</a>
  <a href="/ideator/profile">Profile</a>
</nav>

<h1>My Profile</h1>

<div id="profile"></div>

<a href="/ideator/edit-profile">Edit Profile</a>

<script>
async function loadProfile() {
  const res = await fetch("/api/profile");
  const data = await res.json();

  document.getElementById("profile").innerHTML = `
    <p><b>Name:</b> ${data.username}</p>
    <p><b>Bio:</b> ${data.bio || "Not set"}</p>
    <p><b>Skills:</b> ${data.skills || "Not set"}</p>
    <p><b>Location:</b> ${data.location || "Not set"}</p>
  `;
}

loadProfile();
</script>

</body>
</html>
